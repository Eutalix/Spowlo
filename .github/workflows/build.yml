name: Android Build and Release

on:
  # This workflow is now triggered only when you push a tag starting with 'v' (e.g., v1.5.4)
  push:
    tags:
      - 'v*'
  
  # Also allows manual triggering from the Actions tab.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create placeholder local.properties
        run: |
          touch local.properties
          echo "CLIENT_ID=placeholder" >> local.properties
          echo "CLIENT_SECRET=placeholder" >> local.properties
      
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # UPDATED: Pass the Git tag name (github.ref_name) as a project property to Gradle.
      - name: Build with Gradle
        run: ./gradlew assembleRelease -PversionNameFromTag=${{ github.ref_name }}

      # NEW: This step creates a Release on your GitHub repository.
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This is a special token provided by GitHub Actions
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      # NEW: This step uploads the compiled APKs to the GitHub Release you just created.
      - name: Upload APKs to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app/build/outputs/apk/release/Spowlo-${{ github.ref_name }}.apk
          asset_name: Spowlo-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive
